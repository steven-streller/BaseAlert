# Optional: only needed if you want to reach BaseAlert through k3s' built-in
# Traefik ingress instead of port-forwarding or a NodePort. Edit the host
# below (and add a TLS block) before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: basealert
  namespace: basealert
spec:
  rules:
    - host: basealert.example.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: basealert
                port:
                  number: 8000
