apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: basealert-data
  namespace: basealert
spec:
  accessModes:
    - ReadWriteOnce
  # k3s ships the "local-path" storage class by default; swap this out if you
  # use a different provisioner (e.g. longhorn, nfs-subdir-external-provisioner).
  storageClassName: local-path
  resources:
    requests:
      storage: 256Mi
