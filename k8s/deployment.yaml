apiVersion: apps/v1
kind: Deployment
metadata:
  name: basealert
  namespace: basealert
spec:
  replicas: 1
  strategy:
    type: Recreate # SQLite on a ReadWriteOnce volume can't be shared by two pods
  selector:
    matchLabels:
      app: basealert
  template:
    metadata:
      labels:
        app: basealert
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # Makes the PVC group-writable for GID 1000 on mount - the image's
        # own UID/GID 1000 user (see Dockerfile) is otherwise not guaranteed
        # to own whatever Longhorn/local-path hands back.
        fsGroup: 1000
      # Only needed if the ghcr.io/<owner>/basealert package is private:
      #   kubectl create secret docker-registry ghcr-creds -n basealert \
      #     --docker-server=ghcr.io --docker-username=<gh-user> --docker-password=<gh-pat>
      # imagePullSecrets:
      #   - name: ghcr-creds
      containers:
        - name: basealert
          image: ghcr.io/steven-streller/basealert:latest
          ports:
            - containerPort: 8000
          env:
            - name: TZ
              value: Europe/Berlin
            - name: BASEALERT_DB_PATH
              value: /app/data/basealert.db
            # Set to "false" once everyone who needs an account has one, to
            # stop anyone else from signing up.
            - name: REGISTRATION_ENABLED
              value: "true"
            # Without this secret the app falls back to a random key generated
            # at container start, which logs everyone out on every restart.
            # kubectl create secret generic basealert-secrets -n basealert \
            #   --from-literal=session-secret-key=$(python3 -c "import secrets; print(secrets.token_hex(32))")
            - name: SESSION_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: basealert-secrets
                  key: session-secret-key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: basealert-data
