services:
  basealert:
    build: .
    container_name: basealert
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Berlin
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY:-}
      - BASEALERT_INITIAL_USER_EMAIL=${BASEALERT_INITIAL_USER_EMAIL:-}
      - BASEALERT_INITIAL_USER_PASSWORD=${BASEALERT_INITIAL_USER_PASSWORD:-}
