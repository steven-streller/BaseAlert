<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}BaseAlert{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📻</text></svg>" />
    <link rel="stylesheet" href="/static/style.css" />
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav>
        <span class="brand">📻 BaseAlert</span>
        {% if current_user %}
        <a href="/" class="{{ 'active' if active == 'dashboard' else '' }}">Dashboard</a>
        <a href="/djs" class="{{ 'active' if active == 'djs' else '' }}">DJs</a>
        <a href="/settings" class="{{ 'active' if active == 'settings' else '' }}">Einstellungen</a>
        <span class="nav-user">{{ current_user.email }}</span>
        <form method="post" action="/logout" class="nav-logout">
            <button type="submit" class="link-button">Abmelden</button>
        </form>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
