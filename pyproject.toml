[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "S"]
ignore = ["E501", "UP007", "UP045", "B008"]

[tool.ruff.lint.per-file-ignores]
# assert + hardcoded test credentials are expected in tests, not a real risk
"tests/**/*.py" = ["S101", "S105", "S106", "S107"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["app"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 70

[tool.mypy]
python_version = "3.12"
mypy_path = "."
explicit_package_bases = true
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true

# Not yet type-clean - remove entries here as each module is fixed.
[[tool.mypy.overrides]]
module = ["app.db", "app.main", "app.notifications", "app.scheduler", "app.scraper"]
ignore_errors = true
